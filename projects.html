<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - 1ife</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0b;
            --text: #fafafa;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --muted: #71717a;
            --card-bg: #111113;
            --border: #27272a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 3rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .coming-soon {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 2rem;
        }

        .coming-soon-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .coming-soon h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .coming-soon p {
            color: var(--muted);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--muted);
            font-size: 0.75rem;
            margin-top: 4rem;
        }

        @media (max-width: 640px) {
            nav {
                padding: 1rem 1.5rem;
            }
            .nav-links {
                display: none;
            }
            main {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">1ife</a>
        <ul class="nav-links">
            <li><a href="index.html">Mission</a></li>
            <li><a href="index.html">Values</a></li>
            <li><a href="projects.html" class="active">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Our <span>Projects</span></h1>
            <p class="subtitle">Building the future, one life at a time. Here's what we're working on.</p>
        </header>

        <div class="coming-soon">
            <div class="coming-soon-icon">🚀</div>
            <h2>Projects Coming Soon</h2>
            <p>We're building something amazing. Stay tuned for updates.</p>
        </div>
    </main>

    <footer>
        &copy; 2026 1ife. All rights reserved.
    </footer>
</body>
</html>
